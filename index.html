<!DOCTYPE html>
<html>
<head>
<title>My Website</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
}

/* Navigation bar */
.navbar{
    background-color:#333;
    padding:15px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:20px;
}

.navbar a:hover{
    color:yellow;
}

/* Header */
.header{
    padding:40px;
    background:#4CAF50;
    color:white;
}

/* Image gallery */
.gallery img{
    width:250px;
    margin:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.gallery img:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<!-- Navigation -->
<div class="navbar">
<a href="#">Home</a>
<a href="#">Gallery</a>
<a href="#">Links</a>
</div>

<!-- Header -->
<div class="header">
<h1>Welcome to My Website</h1>
<p>This is my first hosted webpage</p>
</div>

<!-- Gallery -->
<h2>My Images</h2>

<div class="gallery">
<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
</div>

<!-- Links -->
<h2>Useful Links</h2>

<p>
<a href="https://www.google.com">Google</a> |
<a href="https://www.youtube.com">YouTube</a> |
<a href="https://www.w3schools.com">W3Schools</a>
</p>

</body>
</html>
